<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>

    <!-- Primary accent gradient -->
    <linearGradient id="fire" x1="180" y1="100" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff7a3d"/>
      <stop offset="40%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#cc3700"/>
    </linearGradient>

    <!-- Secondary warm glow -->
    <linearGradient id="warm" x1="256" y1="120" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb088"/>
      <stop offset="100%" stop-color="#ff4500"/>
    </linearGradient>

    <!-- Core radial glow -->
    <radialGradient id="coreGlow" cx="256" cy="256" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b2b" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ff4500" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner core radial -->
    <radialGradient id="innerCore" cx="256" cy="248" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff4ee"/>
      <stop offset="30%" stop-color="#ffb088"/>
      <stop offset="70%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#cc3700"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="tinyGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle background grid pattern -->
  <g stroke="#ff450008" stroke-width="0.5">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Ambient glow behind everything -->
  <circle cx="256" cy="248" r="160" fill="url(#coreGlow)"/>

  <!-- Outer orbital ring 3 (faintest) -->
  <ellipse cx="256" cy="252" rx="175" ry="170" fill="none" stroke="#ff4500" stroke-width="0.6" opacity="0.07"
           transform="rotate(-15 256 252)"/>

  <!-- Outer orbital ring 2 -->
  <ellipse cx="256" cy="252" rx="145" ry="140" fill="none" stroke="#ff4500" stroke-width="0.8" opacity="0.1"
           transform="rotate(25 256 252)"/>

  <!-- Outer orbital ring 1 -->
  <ellipse cx="256" cy="252" rx="118" ry="115" fill="none" stroke="#ff4500" stroke-width="1" opacity="0.15"
           transform="rotate(-8 256 252)"/>

  <!-- Six neural pathways radiating from center -->
  <!-- Top -->
  <line x1="256" y1="200" x2="256" y2="105" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="105" x2="220" y2="75" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="105" x2="292" y2="75" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Top-right -->
  <line x1="290" y1="218" x2="365" y2="148" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="365" y1="148" x2="400" y2="140" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="365" y1="148" x2="380" y2="115" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Bottom-right -->
  <line x1="295" y1="278" x2="375" y2="345" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="375" y1="345" x2="405" y2="365" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="375" y1="345" x2="395" y2="325" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Bottom -->
  <line x1="256" y1="300" x2="256" y2="395" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="395" x2="228" y2="425" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="395" x2="284" y2="425" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Bottom-left -->
  <line x1="218" y1="278" x2="138" y2="345" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="138" y1="345" x2="108" y2="365" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="138" y1="345" x2="118" y2="325" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Top-left -->
  <line x1="222" y1="218" x2="148" y2="148" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="148" y1="148" x2="113" y2="140" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="148" y1="148" x2="132" y2="115" stroke="url(#fire)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Synaptic junction dots (ends of branches) -->
  <g fill="#ff4500">
    <!-- Primary junctions -->
    <circle cx="256" cy="105" r="5" opacity="0.8"/>
    <circle cx="365" cy="148" r="4.5" opacity="0.75"/>
    <circle cx="375" cy="345" r="4.5" opacity="0.7"/>
    <circle cx="256" cy="395" r="5" opacity="0.65"/>
    <circle cx="138" cy="345" r="4.5" opacity="0.7"/>
    <circle cx="148" cy="148" r="4.5" opacity="0.75"/>
    <!-- Secondary (leaf) junctions -->
    <circle cx="220" cy="75" r="2.5" opacity="0.4"/>
    <circle cx="292" cy="75" r="2.5" opacity="0.4"/>
    <circle cx="400" cy="140" r="2.5" opacity="0.35"/>
    <circle cx="380" cy="115" r="2.5" opacity="0.35"/>
    <circle cx="405" cy="365" r="2.5" opacity="0.35"/>
    <circle cx="395" cy="325" r="2.5" opacity="0.35"/>
    <circle cx="228" cy="425" r="2.5" opacity="0.35"/>
    <circle cx="284" cy="425" r="2.5" opacity="0.35"/>
    <circle cx="108" cy="365" r="2.5" opacity="0.35"/>
    <circle cx="118" cy="325" r="2.5" opacity="0.35"/>
    <circle cx="113" cy="140" r="2.5" opacity="0.35"/>
    <circle cx="132" cy="115" r="2.5" opacity="0.35"/>
  </g>

  <!-- Hexagonal frame around core -->
  <polygon points="256,185 317,215 317,275 256,305 195,275 195,215"
           fill="none" stroke="url(#warm)" stroke-width="2" stroke-linejoin="round" opacity="0.25"/>

  <!-- Inner hexagon -->
  <polygon points="256,205 297,225 297,265 256,285 215,265 215,225"
           fill="none" stroke="url(#warm)" stroke-width="1.2" stroke-linejoin="round" opacity="0.15"/>

  <!-- Core energy sphere — outer glow -->
  <circle cx="256" cy="248" r="38" fill="#ff4500" opacity="0.08" filter="url(#bigGlow)"/>

  <!-- Core sphere — main body -->
  <circle cx="256" cy="248" r="28" fill="url(#innerCore)" opacity="0.9"/>

  <!-- Core sphere — bright highlight -->
  <circle cx="250" cy="241" r="12" fill="white" opacity="0.15"/>

  <!-- Core sphere — sharp inner ring -->
  <circle cx="256" cy="248" r="28" fill="none" stroke="#ffb088" stroke-width="1.5" opacity="0.5"/>

  <!-- Tiny spark dots near core -->
  <g filter="url(#tinyGlow)">
    <circle cx="232" cy="228" r="2" fill="#ffcba4" opacity="0.6"/>
    <circle cx="282" cy="236" r="1.5" fill="#ffcba4" opacity="0.5"/>
    <circle cx="244" cy="272" r="1.5" fill="#ffcba4" opacity="0.45"/>
    <circle cx="270" cy="264" r="1.8" fill="#ffcba4" opacity="0.5"/>
  </g>

  <!-- Bright spark at top-right — signature detail -->
  <circle cx="338" cy="160" r="4" fill="#ff7a3d" filter="url(#tinyGlow)" opacity="0.7"/>
  <circle cx="338" cy="160" r="1.8" fill="#fff"/>

  <!-- Second small spark bottom-left -->
  <circle cx="170" cy="335" r="3" fill="#ff7a3d" filter="url(#tinyGlow)" opacity="0.5"/>
  <circle cx="170" cy="335" r="1.2" fill="#ffddcc"/>
</svg>
